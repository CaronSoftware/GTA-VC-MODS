<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTA VC MODS</title>

  <style>
    /* NIGHT MODE (Default) Variables */
    :root {
      --primary-color: #2ecc71;
      --secondary-color: #e74c3c;
      --background-color: #1a1a1d;
      --text-color: #e0e0e0;
      --header-bg: #000000;
      --hover-color: #27ae60;
      --button-hover-glow: rgba(46, 204, 113, 0.7);
      --ball-color-start: rgba(74, 163, 255, 0.22);
      --ball-color-end: rgba(74, 163, 255, 0);
      --modal-bg: #2c3e50;
      --link-bg: linear-gradient(to right, #34495e, #4a627a);
    }

    /* DAY MODE Variables */
    body.day-mode {
      --primary-color: #2980b9; /* Persian Blue */
      --secondary-color: #c0392b;
      --background-color: #f4f7f6;
      --text-color: #2c3e50;
      --header-bg: #ffffff;
      --hover-color: #1f618d;
      --button-hover-glow: rgba(41, 128, 185, 0.3);
      --ball-color-start: rgba(41, 128, 185, 0.1); /* Subtle in day */
      --ball-color-end: rgba(41, 128, 185, 0);
      --modal-bg: #ffffff;
      --link-bg: #ecf0f1;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      color: var(--text-color);
      transition: background-color 0.5s, color 0.5s;
      line-height: 1.6;
      overflow: hidden;
      position: relative;
    }

    /* Rising Balls Container */
    .background-container {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
    }

    .ball {
      position: absolute;
      background: radial-gradient(circle, var(--ball-color-start) 0%, var(--ball-color-end) 70%);
      border-radius: 50%;
      animation: riseAndGlow 25s infinite alternate ease-in-out;
      opacity: 0.35;
      filter: blur(18px);
      box-shadow: 0 0 8px rgba(74, 163, 255, 0.1);
    }

    /* Theme Toggle Button */
    #theme-toggle {
      background: none;
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
      padding: 5px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    /* ... Keep all previous keyframes and component styles ... */
    @keyframes riseAndGlow {
      0% { transform: translateY(0) scale(0.8); opacity: 0.25; }
      50% { transform: translateY(-320px) scale(1.05); opacity: 0.45; }
      100% { transform: translateY(-640px) scale(0.95); opacity: 0.18; }
    }

    .top-bar {
      background-color: var(--header-bg);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .btn-primary { background-color: var(--primary-color); color: white; }
    .modal-content { background-color: var(--modal-bg); }
    .download-link { background: var(--link-bg); color: var(--text-color); }
    
    /* ... (rest of styles remain as per previous message) ... */
  </style>
</head>

<body>
  <div class="background-container"></div>

  <div class="top-bar">
    <h1>GTA VC MODS</h1>
    <button id="theme-toggle" onclick="toggleTheme()">تغییر حالت روز/شب</button>
  </div>

  <div class="content">
    <h2>پروژه مادهای GTA Vice City</h2>
    <p>راهنمای جامع ماد کردن و دانلود ابزارهای مورد نیاز</p>
    <button class="btn btn-primary" onclick="showModal('toolsModal')">ابزارها</button>
    <button class="btn btn-primary" onclick="showModal('tutorialModal')">ویدیوهای آموزشی</button>
    <button class="btn btn-primary" onclick="showModal('carModsModal')">مادهای ماشین</button>
  </div>

  <!-- Modals (same as before) -->
  <div id="toolsModal" class="modal"><div class="modal-content">...</div></div>
  <!-- ... etc ... -->

  <script>
    function toggleTheme() {
      document.body.classList.toggle('day-mode');
    }
    
    // Add same initialization script for balls as before...
  </script>
</body>
</html>
