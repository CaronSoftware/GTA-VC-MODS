<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA VC MODS</title>
    <style>
        body { font-family: Tahoma, sans-serif; text-align: center; background: #222; color: #fff; padding: 50px; }
        .btn { padding: 15px 30px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-size: 18px; background: #e74c3c; color: white; }
        .lang-btn { background: #3498db; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #333; margin: 10% auto; padding: 20px; width: 80%; max-width: 500px; border-radius: 10px; }
        .download-link { display: block; margin: 10px 0; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

    <button class="btn lang-btn" onclick="toggleLang()" id="langBtn">English</button>
    <h1 id="title">پروژه مادهای GTA Vice City</h1>

    <button class="btn" onclick="openModal('tools')">ابزارها</button>
    <button class="btn" onclick="openModal('dev')">ویدیوهای آموزشی</button>
    <button class="btn" onclick="openModal('dev')">مادهای ماشین</button>

    <!-- Modal -->
    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle">ابزارها</h2>
            <div id="modalBody">
                <a class="download-link" href="CollEditor_GTA-VC-MODS.rar">CollEditor</a>
                <a class="download-link" href="IMG Tool_GTA-VC-MODS.rar">IMG Tool</a>
                <a class="download-link" href="Magic.TXD_GTA-VC-MODS.rar">Magic.TXD</a>
                <a class="download-link" href="TXD Workshop 4.0_GTA-VC-MODS.rar">TXD Workshop 4.0</a>
                <a class="download-link" href="Vice City Mod Manager_GTA-VC-MODS.rar">Vice City Mod Manager</a>
                <a class="download-link" href="ZModeler 2.2.6_GTA-VC-MODS.rar">ZModeler 2.2.6</a>
            </div>
            <button class="btn" onclick="closeModal()">بستن</button>
        </div>
    </div>

    <script>
        let isPersian = true;
        const translations = {
            fa: { title: "پروژه مادهای GTA Vice City", tools: "ابزارها", dev: "در حال توسعه", close: "بستن", lang: "English" },
            en: { title: "GTA Vice City MODS Project", tools: "Tools", dev: "Under development", close: "Close", lang: "فارسی" }
        };

        function toggleLang() {
            isPersian = !isPersian;
            const t = isPersian ? translations.fa : translations.en;
            document.documentElement.dir = isPersian ? "rtl" : "ltr";
            document.getElementById('title').innerText = t.title;
            document.getElementById('langBtn').innerText = t.lang;
            document.getElementById('modalTitle').innerText = t.tools;
        }

        function openModal(type) {
            document.getElementById('modal').style.display = 'block';
            if(type === 'dev') document.getElementById('modalBody').innerHTML = isPersian ? "در حال توسعه" : "Under development";
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
