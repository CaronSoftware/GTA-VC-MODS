<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GTA VC MODS</title>
  <style>
    :root {
      --primary-color: #2ecc71;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-color: #ffffff;
      --body-bg: #121212;
      --btn-color: #2ecc71;
    }

    body.day-mode {
      --primary-color: #2980b9;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.1);
      --text-color: #2c3e50;
      --body-bg: #e0e7ed;
      --btn-color: #2980b9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--body-bg);
      color: var(--text-color);
      min-height: 100vh;
      transition: background-color 0.4s ease, color 0.4s ease;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .top-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    #theme-toggle {
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid var(--btn-color);
      background: transparent;
      color: var(--btn-color);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    #theme-toggle:hover {
      background: var(--btn-color);
      color: #fff;
    }

    .menu-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
    }

    .menu-buttons button {
      padding: 15px 25px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--glass-bg);
      color: var(--text-color);
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .menu-buttons button:hover {
      background: var(--btn-color);
      color: #fff;
    }

    /* Modal, Responsive styles, etc. omitted for brevity, 
       just apply the glass logic to them similarly */
  </style>
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <h1>GTA VC MODS</h1>
      <button id="theme-toggle" onclick="toggleTheme()">تغییر حالت روز/شب</button>
    </div>

    <h2>به GTA VC MODS خوش آمدید</h2>
    <p>این سایت برای دسترسی به مادها و ابزارهای GTA VC طراحی شده است.</p>

    <div class="menu-buttons">
      <button>ابزارها</button>
      <button>ویدیوهای آموزشی</button>
      <button>مادهای ماشین</button>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('day-mode');
    }
  </script>
</body>
</html>
